·과단성으로 대업을 이루는 지도적 인물이 되는 수."},4:{g:"흉",d:"제사불성. 처음엔 순조롭다가 난데없이 재난을 당한다. 이별·병액 등 불의의 사고로 파탄난다."},5:{g:"길",d:"부귀봉록. 온후하고 건실하여 만사 순조롭게 이룬다. 인덕이 있고 재복이 두텁다."},6:{g:"길",d:"만복자래. 부귀영화를 누리고 안락하게 평생을 보낸다. 가정이 화목하고 자손이 번창한다."},7:{g:"길",d:"맹호출림. 불굴의 노력 끝에 자수성가하여 권력·재력을 갖춘다."},8:{g:"길",d:"수복겸전. 부귀와 장수를 겸해 누리는 길수. 착실하게 노력하여 가정이 화목하다."},9:{g:"흉",d:"대재무용. 큰 재목이지만 쓸모 없다. 지나치게 강한 성격이 화를 부르니 인내가 필요하다."},10:{g:"흉",d:"만사허망. 꿈이 너무 커서 매사 중도 좌절. 허영과 과욕이 몸을 망친다."},11:{g:"길",d:"중인신망. 온화한 성품과 탁월한 사교술로 많은 사람이 좋아하며 따른다."},12:{g:"흉",d:"박약박복. 심신이 허약하고 의지도 약하여 기회를 살리지 못한다. 고독하고 병약하다."},13:{g:"길",d:"충명지모. 슬기롭고 지혜로워 어떤 고난도 개척해나간다. 문학·예술에 두각을 나타낸다."},14:{g:"흉",d:"이산파멸(離散破滅). 큰 뜻을 품지만 계획이 무산되고 불의의 사고를 당하는 운명. 영웅적 기질을 발휘하지만 패가망신하기 쉽다. 부부간 불화, 또는 병으로 고통을 당한다."},15:{g:"길",d:"군계일학. 덕망이 높고 지혜로워 통솔력 있게 사람들을 지도한다."},16:{g:"길",d:"덕망유복. 사교술이 좋고 인자하여 신망이 두텁다. 재복이 두텁고 가정이 화목하다."},17:{g:"길",d:"명망사해. 두뇌가 명석하고 재능이 출중하여 이름을 세계에 떨친다."},18:{g:"길",d:"부귀영달(富貴榮達). 뛰어난 지모와 덕량에 성실하여 만인의 추앙을 받아 부귀공명할 대길운. 단 여자인 경우 남편 운수를 눌러 이별·사별할 수 있다."},19:{g:"흉",d:"고독비참. 믿는 도끼에 발등 찍히고 배신당하기 쉽다. 재물도 흩어지고 단명 우려가 있다."},20:{g:"흉",d:"백사실패. 의지가 박약하여 무슨 일이든 용두사미로 끝난다. 공허한 꿈만 꾸다 실속이 없다."},21:{g:"길",d:"두령(頭領). 지모와 덕량으로 만인의 추앙을 받는 수. 남자는 부귀공명할 대길운. 단 여자인 경우 남편 운수를 눌러 이별·사별 우려가 있다."},22:{g:"흉",d:"중도좌절. 총명하고 재주가 있으나 의지가 약해 용두사미가 되기 쉽다."},23:{g:"길",d:"일흥중천. 명철한 두뇌와 과단성으로 큰 뜻을 이룬다. 사회적 명성과 재복을 함께 누린다."},24:{g:"길",d:"부귀영화. 성실하고 근면하여 재산을 모으고 이름을 떨친다. 말년에 더욱 번창한다."},25:{g:"길",d:"지모순조. 재치 있고 솔직하여 자수성가하고 대업을 이룬다. 인덕으로 협력자를 얻는다."},26:{g:"흉",d:"영웅풍파. 파란만장한 운수로 말년이 쓸쓸하다. 성공과 실패를 반복하며 가정 불화를 겪는다."},27:{g:"중길",d:"대인격. 영리하고 강인하여 예술·스포츠에 두각을 나타낸다. 성공과 실패의 기복이 있다."},28:{g:"흉",d:"파란풍파. 재능은 있으나 운이 따르지 않아 인생의 파란곡절이 심하다."},29:{g:"길",d:"권력재물. 강렬한 의지와 지모로 재산과 권력을 한번에 거머쥔다."},30:{g:"중길",d:"길흉상반. 성공과 실패가 거듭된다. 긍정적 마음자세로 꾸준히 노력하면 결국 성공한다."},31:{g:"길",d:"자수성가(自手成家), 개화만발(開花滿發). 지략이 뛰어나며 날카로운 통찰력으로 만난을 돌파하여 명성과 부귀를 누릴 대길운이다."},32:{g:"길",d:"의외득재. 귀인의 도움으로 뜻밖의 행운을 만난다. 부귀와 명예를 함께 얻는다."},33:{g:"길",d:"권위충천. 타고난 머리와 강한 지도력으로 번창한다. 강함이 지나치면 고집이 되니 주의."},34:{g:"흉",d:"재화연속. 한번 불운이 시작되면 재난이 잇달아 닥친다. 무리한 욕심을 버려야 한다."},35:{g:"길",d:"온유화순. 원만한 대인관계로 부귀를 얻고 장수한다. 급하게 서두르지 않으면 말년에 번영한다."},36:{g:"흉",d:"영걸시비. 성공하면 곧 실패할 운이 뒤따른다. 겸손하게 처신해야 한다."},37:{g:"길",d:"권위인덕. 덕망과 능력을 겸비하여 신망을 얻어 부귀공명의 운수이다."},38:{g:"길",d:"문예기예. 섬세한 감수성과 뛰어난 예술적 재능으로 문학·예술·창작에 큰 업적을 남긴다."},39:{g:"길",d:"위세강중. 강한 카리스마와 지도력으로 세인의 존경을 받으며 부귀장수를 누린다."},40:{g:"흉",d:"변화공허. 성공과 실패가 변화무쌍하여 허무감을 맛본다. 일관된 목표와 끈기가 필요하다."},41:{g:"길",d:"선견고명. 미래를 내다보는 혜안과 탁월한 통찰력으로 지도자가 된다."},42:{g:"흉",d:"파란자초. 뛰어난 두뇌와 재능을 가졌으나 결단력이 부족해 스스로 화를 자초한다."},43:{g:"흉",d:"패가망신. 겉으로 행복해 보이나 실속 없다. 재물도 쌓이는 듯하다가 한꺼번에 흩어진다."},44:{g:"흉",d:"백전백패. 아무리 노력해도 성과를 거두기 어렵다. 분수를 지키면 큰 탈이 없다."},45:{g:"길",d:"통달사해. 넓은 시야와 포용력으로 순풍에 돛을 단 듯 순조롭게 대성한다."},46:{g:"흉",d:"곤궁신고. 영웅재사가 때를 얻지 못하는 격. 인정받지 못하고 경제적으로 어려움을 겪는다."},47:{g:"길",d:"일확천금. 강한 추진력과 결단력으로 재물을 모은다. 오직 이득만 있을 뿐 손해가 없다."},48:{g:"길",d:"배후조종. 남을 선도하는 입장에서 복록을 잃지 않는다. 덕망과 신중함으로 안정된 삶."},49:{g:"중길",d:"선고후감. 성공과 실패가 거듭되는 변화무쌍한 운수. 인내하면 결국 좋은 결과를 얻는다."},50:{g:"흉",d:"공허실의. 의지가 약하고 자립심이 부족하다. 현실적 목표를 세우고 작은 것부터 실천해야 한다."},51:{g:"흉",d:"파란변동. 한때 크게 성공하나 허사가 될 흉운도 있다. 재물이 모였다가 흩어지기를 반복한다."},52:{g:"길",d:"비룡승천. 초년에는 고생하지만 중년 이후로 크게 발전하여 부자로 이름을 떨친다."},53:{g:"흉",d:"외화내빈. 겉으로 부유한 듯하나 실속이 없다. 낭비벽이 있고 계획성이 없다."},54:{g:"흉",d:"절망불구. 반생은 길운이나 말년은 패가망신. 절정에 달했을 때 더욱 겸손히 처신해야 한다."},55:{g:"중길",d:"극성극쇠. 마침내 큰 성공을 거두나 그 강함이 지나쳐 극단으로 치닫기 쉽다. 자식 복이 약하다."},56:{g:"흉",d:"변전무상. 중년 이후 점차 쇠약하여 고독하다. 일찍부터 노후를 대비해야 한다."},57:{g:"길",d:"고진감래. 초년의 고난을 인내하면 중년 이후 크게 발전한다. 해외에서 이름을 알릴 기회가 온다."},58:{g:"중길",d:"선길후래. 초반에는 순조롭게 명예와 재물을 얻는다. 다소 기복이 있으나 전체적으로 길하다."},59:{g:"흉",d:"의지박약. 인내심이 부족하고 좋은 기회가 와도 결단하지 못하고 망설이다가 놓친다."},60:{g:"흉",d:"봉록자실. 재물이 들어와도 지키지 못하고 건강도 잃기 쉽다. 낭비와 과욕이 화를 부른다."},61:{g:"길",d:"영달격. 부귀운."},62:{g:"흉",d:"쇠멸격. 고립운."},63:{g:"길",d:"길상격. 순성운."},64:{g:"흉",d:"고행격. 쇠퇴운."},65:{g:"길",d:"유덕격. 행복운."},66:{g:"흉",d:"쇠망격. 재액운."},67:{g:"길",d:"형통격. 영달운."},68:{g:"길",d:"공명격. 흥왕운."},69:{g:"흉",d:"재난격. 정지운."},70:{g:"흉",d:"적막격. 공허운."},71:{g:"길",d:"발전격. 만달운. 꾸준히 노력하면 만년에 빛을 발한다."},72:{g:"흉",d:"평상격. 상반운. 길흉이 교차하며 평범한 일생."},73:{g:"길",d:"노력격. 평길운. 부단한 노력으로 평안하고 무난한 성공."},74:{g:"흉",d:"불우격. 파탄운. 뜻대로 되는 일이 없다."},75:{g:"길",d:"수분격. 평화운. 분수를 지키면 평화롭고 안정된 삶."},76:{g:"흉",d:"선곤격. 초중년은 고난, 후반에 나아진다."},77:{g:"길",d:"희비격. 기쁨과 슬픔이 교차하나 전체적으로 길하다."},78:{g:"길",d:"만고격. 많은 고난을 겪지만 결국 평안함을 얻는다."},79:{g:"흉",d:"궁극격. 극도로 힘들며 신뢰를 잃기 쉽다."},80:{g:"흉",d:"은둔격. 쇠락의 운이다."},81:{g:"길",d:"환원격. 대성운. 크게 이루고 완성하는 대성의 운이다."}},bn={길:"#2d6a3f",중길:"#7a5a1a",흉:"#8b2020"},bf={길:"#eef6f0",중길:"#fdf7e8",흉:"#fdf0f0"},wr={1:{n:"중천건(重天乾)",k:"건위천",d:"강건한 창조 에너지. 강한 의지와 리더십으로 큰 일을 이룬다. 다만 지나친 강함은 독선이 되니 유연함을 잃지 말 것."},2:{n:"중지곤(重地坤)",k:"곤위지",d:"포용과 수용의 에너지. 뒤에서 받쳐주는 역할이 길하다. 인내와 협력으로 결실을 맺는다."},3:{n:"수뢰둔(水雷屯)",k:"수뢰둔",d:"시작의 어려움. 혼돈 속 새 생명이 싹트는 시기. 서두르지 말고 차근차근 기반을 다져야 한다."},4:{n:"산수몽(山水蒙)",k:"산수몽",d:"배움과 성장의 괘. 겸손하게 스승을 찾아 배우면 지혜가 열린다."},5:{n:"수천수(水天需)",k:"수천수",d:"기다림의 지혜. 준비를 충실히 하며 때를 기다리면 반드시 기회가 온다."},6:{n:"천수송(天水訟)",k:"천수송",d:"갈등과 다툼의 시기. 강하게 맞서기보다 중재와 타협이 상책이다."},7:{n:"지수사(地水師)",k:"지수사",d:"조직과 리더십의 괘. 덕망으로 사람들을 이끌면 큰 일을 이룬다."},8:{n:"수지비(水地比)",k:"수지비",d:"친밀과 협력의 괘. 신뢰를 바탕으로 서로 돕고 함께 나아간다."},9:{n:"풍천소축(風天小畜)",k:"풍천소축",d:"작은 축적의 시기. 작은 것을 꾸준히 쌓으며 역량을 기르면 크게 펼친다."},10:{n:"천택리(天澤履)",k:"천택리",d:"예의와 절도의 괘. 분수에 맞게 바르게 처신하면 위험도 무사히 넘긴다."},11:{n:"지천태(地天泰)",k:"지천태",d:"태평과 번영의 최길괘. 위아래가 소통하고 만사가 형통한다. 교만하지 말고 겸손을 유지해야 한다."},12:{n:"천지비(天地否)",k:"천지비",d:"막힘과 단절의 시기. 무리하게 전진하지 말고 내실을 다지며 때를 기다린다."},13:{n:"천화동인(天火同人)",k:"천화동인",d:"동지와의 연대. 뜻 맞는 사람들과 협력하면 큰 일을 이룬다."},14:{n:"화천대유(火天大有)",k:"화천대유",d:"대소유와 풍요의 대길괘. 밝은 지혜와 덕으로 베풀면 재능과 리더십이 크게 빛난다."},15:{n:"지산겸(地山謙)",k:"지산겸",d:"겸손의 덕. 낮은 자세를 유지하면 오히려 높아진다. 매우 길한 괘."},16:{n:"뇌지예(雷地豫)",k:"뇌지예",d:"기쁨과 준비. 미리 대비하고 즐거운 마음으로 나아가면 길하다."},17:{n:"택뢰수(澤雷隨)",k:"택뢰수",d:"따름과 순응. 때와 상황에 맞게 유연하게 적응하면 자연스럽게 좋은 결과를 얻는다."},18:{n:"산풍고(山風蠱)",k:"산풍고",d:"혁신과 개혁. 오래된 폐단을 과감히 바로잡으면 새로운 도약의 발판이 된다."},19:{n:"지택림(地澤臨)",k:"지택림",d:"덕과 위엄으로 사람들에게 다가가 감화시키는 시기. 리더십 발휘에 좋은 때."},20:{n:"풍지관(風地觀)",k:"풍지관",d:"관찰과 통찰. 섣불리 행동하기보다 상황을 정확히 파악하고 솔선수범하라."},21:{n:"화뢰서합(火雷噬嗑)",k:"화뢰서합",d:"결단과 극복. 장애물을 단호하게 제거하면 성공한다."},22:{n:"산화비(山火賁)",k:"산화비",d:"꾸밈과 아름다움. 내실 위에 형식을 더하는 괘. 예술적 감각이 빛난다."},23:{n:"산지박(山地剝)",k:"산지박",d:"소멸과 쇠퇴. 무리하게 전진하지 말고 지키며 때를 기다리는 것이 최선이다."},24:{n:"지뢰복(地雷復)",k:"지뢰복",d:"회복과 새출발. 사라졌던 기운이 돌아오는 시기. 긍정적 변화가 시작된다."},25:{n:"천뢰무망(天雷無妄)",k:"천뢰무망",d:"자연스러움과 순수. 억지 없이 올바른 길을 걸으면 뜻밖의 행운이 따른다."},26:{n:"산천대축(山天大畜)",k:"산천대축",d:"크게 축적하는 시기. 드러내지 말고 배움과 수양으로 역량을 키워 때를 기다려라."},27:{n:"산뢰이(山雷頤)",k:"산뢰이",d:"양육과 자기관리. 무엇으로 자신을 기르고 남을 양육하는가가 핵심이다."},28:{n:"택풍대과(澤風大過)",k:"택풍대과",d:"과중한 짐의 시기. 비상한 결단과 용기가 필요하며 무리하면 무너질 수 있다."},29:{n:"중수감(重水坎)",k:"감위수",d:"험난함 속 지혜. 진실함을 지키며 물처럼 유연하게 나아가면 험난함을 빠져나온다."},30:{n:"중화리(重火離)",k:"리위화",d:"밝음과 아름다움. 밝은 지혜로 사람들에게 희망을 주는 존재가 된다."},31:{n:"택산함(澤山咸)",k:"택산함",d:"감응과 소통. 진심으로 대하면 마음이 통하고 깊은 연결이 이루어진다."},32:{n:"뇌풍항(雷風恒)",k:"뇌풍항",d:"항상함과 지속. 변하지 않는 원칙으로 꾸준히 나아가면 반드시 성과가 쌓인다."},33:{n:"천산둔(天山遁)",k:"천산둔",d:"물러남의 지혜. 형세가 불리할 때 과감히 물러서는 결단이 현명하다."},34:{n:"뇌천대장(雷天大壯)",k:"뇌천대장",d:"강대한 기운. 힘이 충만하지만 예의와 도리로 절제해야 진정한 대장부가 된다."},35:{n:"화지진(火地晉)",k:"화지진",d:"진보와 발전. 태양처럼 위로 올라가는 시기. 적극적으로 나아가면 크게 성공한다."},36:{n:"지화명이(地火明夷)",k:"지화명이",d:"밝음이 가려진 시기. 내면의 빛을 지키며 인내하면 어두운 시기를 견뎌낼 수 있다."},37:{n:"풍화가인(風火家人)",k:"풍화가인",d:"가정과 공동체. 가정의 질서와 화목에서 모든 성공의 기초가 시작된다."},38:{n:"화택규(火澤睽)",k:"화택규",d:"분리와 불일치. 서로 다름을 인정하고 공통점을 찾아 화합해야 한다."},39:{n:"수산건(水山蹇)",k:"수산건",d:"어려움과 장애. 혼자 해결하려 말고 주변의 도움을 구하며 때를 기다려라."},40:{n:"뇌수해(雷水解)",k:"뇌수해",d:"해방과 해소. 얽힌 문제가 풀리는 시기. 과거를 털고 가볍게 새출발하라."},41:{n:"산택손(山澤損)",k:"산택손",d:"줄임과 헌신. 덜어내고 베풀면 진정한 것을 얻는다. 손해처럼 보여도 더 큰 것으로 돌아온다."},42:{n:"풍뢰익(風雷益)",k:"풍뢰익",d:"더함과 이로움. 나누면 더 크게 돌아온다. 사업 확장과 새 도전에 길한 때."},43:{n:"택천쾌(澤天夬)",k:"택천쾌",d:"결단과 돌파. 단호하게 결단하되 덕과 도리로써 처리해야 한다."},44:{n:"천풍구(天風姤)",k:"천풍구",d:"뜻밖의 만남. 예상치 못한 인연이 생기는 때. 경솔하게 빠져들지 않도록 신중해야 한다."},45:{n:"택지췌(澤地萃)",k:"택지췌",d:"모임과 결집. 뜻을 함께하는 사람들을 모아 큰 일을 도모하기 좋은 때."},46:{n:"지풍승(地風升)",k:"지풍승",d:"상승과 성장. 착실하게 한 걸음씩 쌓아 위로 나아가면 반드시 높은 곳에 이른다."},47:{n:"택수곤(澤水困)",k:"택수곤",d:"곤경 속 지조. 어려운 시기이지만 뜻을 굽히지 않으면 반드시 빠져나온다."},48:{n:"수풍정(水風井)",k:"수풍정",d:"근원과 나눔. 우물처럼 재능과 지혜를 아끼지 말고 사람들을 이롭게 하라."},49:{n:"택화혁(澤火革)",k:"택화혁",d:"변혁과 혁신. 때가 무르익으면 단호하게 낡은 것을 바꾸어 새 질서를 세워라."},50:{n:"화풍정(火風鼎)",k:"화풍정",d:"새로운 질서와 문화. 훌륭한 인재를 기르고 새 시스템을 만드는 역할이 길하다."},51:{n:"중뢰진(重雷震)",k:"진위뢰",d:"충격과 각성. 갑작스러운 변화가 오지만 침착하게 대처하면 성장의 계기가 된다."},52:{n:"중산간(重山艮)",k:"간위산",d:"정지와 명상. 멈추어야 할 때를 알고 내면을 고요히 하면 다음 도약의 힘을 얻는다."},53:{n:"풍산점(風山漸)",k:"풍산점",d:"점진적 발전. 서두르지 않고 단계를 밟아 나아가면 반드시 성공한다."},54:{n:"뇌택귀매(雷澤歸妹)",k:"뇌택귀매",d:"인연과 헌신. 올바른 도리를 따르고 진심을 다하면 결국 인연이 맺어진다."},55:{n:"뇌화풍(雷火豐)",k:"뇌화풍",d:"풍요와 최성기. 가장 번창한 시기이지만 절정에서 더욱 겸손해야 오래 유지된다."},56:{n:"화산려(火山旅)",k:"화산려",d:"여행과 유랑. 낯선 환경에서 신중하게 처신하고 작은 것에 만족하며 유연하게 적응하라."},57:{n:"중풍손(重風巽)",k:"손위풍",d:"유연한 침투. 바람처럼 부드럽게 스며들어 목적을 이룬다. 강하게 밀어붙이지 말 것."},58:{n:"중택태(重澤兌)",k:"태위택",d:"기쁨과 소통. 진실한 기쁨으로 사람들과 교류하고 활력을 불어넣는다."},59:{n:"풍수환(風水渙)",k:"풍수환",d:"분산과 해소. 막힌 것을 흩어 새로운 흐름을 만든다. 정신적 가치에 의지하면 도움이 된다."},60:{n:"수택절(水澤節)",k:"수택절",d:"절제와 균형. 적절한 절도로 지속 가능한 삶을 만든다. 지나친 절제도 방종도 흉하다."},61:{n:"풍택중부(風澤中孚)",k:"풍택중부",d:"믿음과 신뢰. 진심에서 우러나는 믿음은 어떤 마음도 움직인다. 진정성이 핵심."},62:{n:"뇌산소과(雷山小過)",k:"뇌산소과",d:"작은 것이 지나침. 큰 목표보다 현실적인 작은 일에 집중하는 것이 길한 때."},63:{n:"수화기제(水火旣濟)",k:"수화기제",d:"완성과 성취. 이미 이루어진 것을 잘 유지해야 한다. 성공 후 방심하면 무너진다."},64:{n:"화수미제(火水未濟)",k:"화수미제",d:"미완성의 가능성. 아직 이루어지지 않았기에 무한한 가능성이 열려있다. 끝까지 최선을 다하라."}};function Gl({label:x,name:N,value:M,onChange:f}){const H=parseInt(M),_=H>=1&&H<=64?wr[H]:null;return h.jsxs("div",{className:"fld",children:[h.jsxs("label",{className:"fld-label",children:[x,_&&h.jsxs("span",{style:{display:"inline-block",padding:"2px 8px",fontSize:"11px",background:"#f0ecf8",color:"#4a3a7a",border:"1px solid #9a8ac0",marginLeft:"8px",fontWeight:"600"},children:[H,"괘 · ",_.k]})]}),h.jsx("input",{className:"fi",name:N,value:M,onChange:f,placeholder:"예: 14"}),_&&h.jsxs("div",{style:{marginTop:"6px",padding:"10px 12px",fontSize:"12px",background:"#f5f3fc",borderLeft:"3px solid #7a6ab0",color:"#2a1a4a",lineHeight:"1.7"},children:[h.jsx("strong",{children:_.n})," — ",_.d]})]})}function kr({num:x}){if(!x||!w1[x])return null;const{g:N}=w1[x];return h.jsxs("span",{style:{display:"inline-block",padding:"2px 8px",fontSize:"11px",backg   @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; overflow-anchor: none; }
  .app { min-height: 100vh; background: #f5f0e8; font-family: 'Noto Serif KR', serif; color: #1a1510; -webkit-user-drag: none; }
  .hdr { background: #1a1510; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .hdr-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: #d4c4a0; letter-spacing: 2px; }
  .hdr-sub { font-size: 11px; letter-spacing: 2px; color: #9a8a6a; text-transform: uppercase; margin-top: 4px; }
  .tabs { background: #120f0a; display: flex; border-top: 1px solid #2a2010; }
  .tab { padding: 11px 24px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #5a4a35; cursor: pointer; border: none; background: transparent; font-family: 'Noto Serif KR', serif; transition: all 0.2s; border-bottom: 2px solid transparent; }
  .tab.active { color: #d4c4a0; border-bottom-color: #d4c4a0; }
  .tab:hover:not(.active) { color: #9a8a70; }
  .tab-badge { display: inline-block; background: #c07050; color: white; border-radius: 8px; font-size: 9px; padding: 1px 6px; margin-left: 6px; }
  .tab-badge.done { background: #4a7a50; }
  .page { max-width: 720px; margin: 0 auto; padding: 48px 32px; }
  .page-wide { max-width: 860px; margin: 0 auto; padding: 48px 32px; }
  .eyebrow { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #9a7a50; margin-bottom: 12px; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: #1a1510; margin-bottom: 10px; line-height: 1.2; }
  .page-desc { font-size: 13px; color: #6a5a45; line-height: 1.8; margin-bottom: 40px; }
  .sec { margin-bottom: 40px; }
  .sec-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #d4c4a0; }
  .sec-num { font-family: 'Cormorant Garamond', serif; font-size: 34px; color: #d4c4a0; font-style: italic; line-height: 1; }
  .sec-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #6a5a45; }
  .fld { margin-bottom: 18px; }
  .fld-label { font-size: 12px; color: #4a3a25; margin-bottom: 7px; display: block; line-height: 1.5; }
  .fld-req { color: #c07050; margin-left: 3px; }
  input.fi, select.fi { width: 100%; background: #fff; border: 1px solid #d4c4a0; color: #1a1510; padding: 11px 14px; font-size: 13px; font-family: 'Noto Serif KR', serif; outline: none; transition: border-color 0.2s; }
  input.fi:focus, select.fi:focus { border-color: #8a6a40; }
  textarea.fi { width: 100%; background: #fff; border: 1px solid #d4c4a0; color: #1a1510; padding: 11px 14px; font-size: 13px; font-family: 'Noto Serif KR', serif; outline: none; resize: vertical; min-height: 72px; transition: border-color 0.2s; }
  textarea.fi:focus { border-color: #8a6a40; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .choices { display: flex; flex-direction: column; gap: 7px; }
  .choice { background: #fff; border: 1px solid #d4c4a0; padding: 11px 14px; text-align: left; font-size: 13px; font-family: 'Noto Serif KR', serif; color: #4a3a25; cursor: pointer; transition: all 0.2s; }
  .choice:hover { background: #f0e8d8; border-color: #8a6a40; }
  .choice.sel { background: #1a1510; color: #d4c4a0; border-color: #1a1510; }
  .q-wrap { margin-bottom: 30px; }
  .q-num-big { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #d4c4a0; font-style: italic; margin-bottom: 6px; }
  .q-text { font-size: 14px; color: #1a1510; line-height: 1.6; margin-bottom: 14px; font-weight: 500; }
  .q-done { font-size: 11px; color: #4a7a50; margin-top: 6px; }
  .rank-hint { font-size: 11px; color: #9a7a50; margin-bottom: 8px; }
  .prog-wrap { margin-bottom: 32px; }

  <body>
    <div id="root"></div>
  <script>
(function() {
  const SUPABASE_URL = 'https://wavhcknviozwadqyjlug.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhdmhja252aW96d2FkcXlqbHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTQ5NjksImV4cCI6MjA5MDQzMDk2OX0.frq_z3GgL8BEjHCRuVcdOqPLe0DhJp0k-joOXYVK_Ws';

  let saved = false;

  async function saveReport() {
    if (saved) return;

    const nameEl = document.querySelector('.rpt-name') || document.querySelector('[class*="rpt-name"]');
    const emailEl = document.querySelector('input[type="email"]');
    const reportEl = document.querySelector('.rpt-wrap') || document.querySelector('[class*="rpt"]');

    if (!reportEl) return;

    const name = nameEl ? nameEl.textContent.trim() : '';
    const email = emailEl ? emailEl.value.trim() : '';
    const reportHtml = reportEl.innerHTML || '';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/life_reports`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          name: name || null,
          email: email || null,
          report_text: reportHtml,
          source: 'weros-life'
        })
      });
      if (res.ok) { saved = true; console.log('✅ 저장 완료'); }
      else console.error('❌ 저장 실패', await res.text());
    } catch(e) {
      console.error('❌ 오류', e);
    }
  }

  const observer = new MutationObserver(() => {
    const rpt = document.querySelector('.rpt-wrap') || document.querySelector('[class*="rpt"]');
    if (rpt && !saved) {
      setTimeout(saveReport, 2000);
    }
  });

  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
